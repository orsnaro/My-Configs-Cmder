      ]

widgets:
  grouper-extras:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "grouper-extras"
      widgets: [
        "systray",
        "ai_chat",
        "pomodoro",
        "notes",
        "todo",
        "github",
        "libre_gpu",
        "vscode",
        # "quick_launch", 
        #"memory",
        #"disk",
      ]
      collapse_options:
        enabled: true
        exclude_widgets: ["ai_chat", "todo"]
        expanded_label: "\uf054"
        collapsed_label: "\uf053"
        label_position: "right"
  home:
    type: "yasb.home.HomeWidget"
    options:
      label: "<span>\ue62a</span>"
      menu_list:
        - { title: "🏠 Home", path: "~" }
        - { title: "⬇️ Downloads", path: "~/Downloads" }
        - { title: "📄 Documents", path: "~/Documents" }
        - { title: "🖼️ Pictures", path: "~/Pictures" }
        - { title: "🎬 Videos", path: "~/Videos" }
        - { title: "🎵 Music", path: "~/Music" }
        - { title: "🗑️ Recycle Bin", path: 'C:\Scripts\Shortcuts\Recycle Bin.lnk' }
      system_menu: true
      power_menu: false
      blur: true
      round_corners: true
      round_corners_type: "large"
      alignment: "left"
      offset_left: 4
      offset_top: 0
  glazewm_workspaces:
    type: "glazewm.workspaces.GlazewmWorkspacesWidget"
    options:
      offline_label: "GlazeWM Offline"
      populated_label: "{name}"
      empty_label: "{name}"
      active_populated_label: "{display_name}"
      active_empty_label: "{display_name}"
      hide_empty_workspaces: false
      hide_if_offline: false
  taskbar:
    type: "yasb.taskbar.TaskbarWidget"
    options:
      icon_size: 16
      tooltip: true
      show_only_visible: false
      strict_filtering: true
      monitor_exclusive: false
      hide_empty: true
      animation:
        enabled: true
      preview:
        enabled: true
        width: 140
        delay: 400
        padding: 8
        margin: 8
      title_label:
        enabled: false
        show: "focused"
        min_length: 10
        max_length: 20
      ignore_apps:
        processes: []
        titles: []
        classes: []
  ai_chat:
    type: "yasb.ai_chat.AiChatWidget"
    options:
      label: "<span>\uDB81\uDE74</span>"
      chat:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "system"
        alignment: "center"
        direction: "down"
        offset_left: 0
        offset_top: 6
      icons:
        attach: "\uf067"
        send: "\uf1d8"
        stop: "\uf04d"
        clear: "\uf1f8"
        assistant: "\udb81\ude74"
        #float_on: "\udb84\udcac"
        #float_off: "\udb84\udca9"
        #close: "\uf00d"
        #copy: "\uebcc"
        #copy_check: "\uf00c"
      #start_floating: false
      notification_dot:
        enabled: false
        corner: "top_right"
        color: "red"
        margin: [ 0, 2 ]
      callbacks:
        on_left: "toggle_chat"
      providers:
        - provider: "Deepseek"
          api_endpoint: "https://api.deepseek.com/v1"
          credential: "$env:DEEPSEEK_YASB_KEY"
          models:
          - name: "deepseek-chat"
            label: "Deepseek Chat"
            temperature: 0.3
            top_p: 0.95
            max_tokens: 8192
            max_image_size: 1024
            max_attachment_size: 256
            instructions: "C:\\Users\\{Username}\\custom_ai_instruction_chatmode.md"
            default: true
          - name: "deepseek-chat"
            label: "Deepseek Chat 2"
            temperature: 0.3
            top_p: 0.95
            max_tokens: 8192
            max_image_size: 1024
            max_attachment_size: 256
            instructions: "C:\\Users\\{Username}\\custom_ai_instruction_chatmode.md"
          - name: "deepseek-chat"
            label: "Deepseek Chat 3"
            temperature: 0.3
            top_p: 0.95
            max_tokens: 8192
            max_image_size: 1024
            max_attachment_size: 256
            instructions: "C:\\Users\\{Username}\\custom_ai_instruction_chatmode.md"
          - name: "deepseek-reasoner"
            label: "Deepseek Reasoner"
            temperature: 0.3
            top_p: 0.95
            max_tokens: 65536
            max_image_size: 1024
            max_attachment_size: 256
            instructions: "C:\\Users\\{Username}\\custom_ai_instruction_chatmode.md"
        - provider: "Gemini"
          api_endpoint: "https://api.gemini.google.com/v1"
          credential: "$env:GEMINI_YASB_KEY"
          models:
          - name: "gemini-3-flash-preview"
            label: "Gemini Flash 3"
            temperature: 0.3
            top_p: 0.95
            max_tokens: 65536
            max_image_size: 1024
            max_attachment_size: 256
            instructions: "C:\\Users\\{Username}\\custom_ai_instruction_chatmode.md"
          - name: "gemini-3.1-pro-preview"
            label: "Gemini Pro 3.1"
            temperature: 0.3
            top_p: 0.95
            max_tokens: 65536
            max_image_size: 1024
            max_attachment_size: 256
            instructions: "C:\\Users\\{Username}\\custom_ai_instruction_chatmode.md"
          - name: "gemini-2.5-pro"
            label: "Gemini Pro 2.5"
            temperature: 0.3
            top_p: 0.95
            max_tokens: 65536
            max_image_size: 1024
            max_attachment_size: 256
            instructions: "C:\\Users\\{Username}\\custom_ai_instruction_chatmode.md"
          - name: "gemini-2.5-flash"
            label: "Gemini Flash 2.5"
            temperature: 0.3
            top_p: 0.95
            max_tokens: 65536
            max_image_size: 1024
            max_attachment_size: 256
            instructions: "C:\\Users\\{Username}\\custom_ai_instruction_chatmode.md"
  notes:
    type: "yasb.notes.NotesWidget"
    options:
      label: "<span>\udb82\udd0c</span> {count}"
      label_alt: "{count} notes"
      # data_path: "~/Documents/my-notes.json"  # Optional: custom JSON file path
      menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        max_title_size: 150
        show_date_time: true
      icons:
        note: "\udb82\udd0c"
        delete: "\ueab8"
        copy: "\uebcc"
      callbacks:
        on_left: "toggle_menu"
        on_middle: "do_nothing"
        on_right: "toggle_label"
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
  quick_launch:
    type: "yasb.quick_launch.QuickLaunchWidget"
    options:
        label: "<span>\uf002</span>"
        search_placeholder: "Search applications..."
        max_results: 50
        show_icons: true
        icon_size: 32
        providers:
            window_switcher:
                enabled: true
                prefix: "*"
                priority: -1
            apps:
                enabled: true
                prefix: "*"
                priority: 0
                show_recent: true
                max_recent: 5
                show_description: true
            calculator:
                enabled: true
                prefix: "="
                priority: 1
            clipboard_history:
                enabled: true
                prefix: "cb"
                priority: 2
                max_items: 30
            currency:
                enabled: true
                prefix: "$"
                priority: 3
            bookmarks:
                enabled: true
                prefix: "*"
                priority: 4
                browser: "all"
                profile: "Default"
            web_search:
                enabled: true
                prefix: "?"
                priority: 5
                engine: "google"
            system_commands:
                enabled: true
                prefix: ">"
                priority: 6
            settings:
                enabled: true
                prefix: "@"
                priority: 7
            kill_process:
                enabled: true
                prefix: "!"
                priority: 8
            port_viewer:
                enabled: true
                prefix: "pv"
                priority: 9
                tcp_listening_only: true
                include_established: false
            file_search:
                enabled: true
                prefix: "/"
                priority: 10
                backend: "auto"
                show_path: true
            unit_converter:
                enabled: true
                prefix: "~"
                priority: 11
            emoji:
                enabled: true
                prefix: ":"
                priority: 12
            color:
                enabled: true
                prefix: "c:"
                priority: 13
            world_clock:
                enabled: true
                prefix: "tz"
                priority: 14
            snippets:
                enabled: true
                prefix: ";"
                priority: 15
                type_delay: 200
            hacker_news:
                enabled: true
                prefix: "hn"
                priority: 16
                cache_ttl: 300
                max_items: 30
            dev_tools:
                enabled: true
                prefix: "dev"
                priority: 17
            ip_info:
                enabled: true
                prefix: "ip"
                priority: 18
            vscode:
                enabled: true
                prefix: "vsc"
                priority: 19
        popup:
            width: 720
            height: 480
            screen: "focus"
            blur: true
            round_corners: true
            round_corners_type: "normal"
            border_color: "system"
            dark_mode: true
        callbacks:
            on_left: "toggle_quick_launch"
        keybindings:
            - keys: "alt+space"
              action: "toggle_quick_launch"
  launchpad:
    type: "yasb.launchpad.LaunchpadWidget"
    options:
      label: "<span>\udb85\udcde</span>"
      search_placeholder: "Search apps..."
      app_icon_size: 48
      window:
        fullscreen: false
        width: 800
        height: 600
        overlay_block: true
      window_style:
        enable_blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "system"
      window_animation:
        fade_in_duration: 120
        fade_out_duration: 100
      callbacks:
        on_left: "toggle_launchpad"
      app_title_shadow:
        enabled: true
        color: "#00000090"
        offset: [1, 1]
        radius: 2
      app_icon_shadow:
        enabled: true
        color: "#00000090"
        offset: [0, 2]
        radius: 8
  todo:
    type: "yasb.todo.TodoWidget"
    options:
      label: "\uf0ae {count}/{completed}"
      label_alt: "\uf0ae Tasks: {count}"
      # data_path: "~/Documents/my-todos.json"  # Optional: custom JSON file path
      menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "system"
        alignment: "center"
        direction: "down"
        offset_top: 6
        offset_left: 0
      icons:
        add: "\uf501 New Task"
        edit: "Edit"
        delete: "Delete"
        date: "\ue641"
        category: "\uf412"
        checked: "\udb80\udd34"
        unchecked: "\udb80\udd30"
        sort: "\ueab4"
        no_tasks: "\uf4a0"
      categories:
        default:
          label: "General"
        soon:
          label: "Complete soon"
        today:
          label: "End of day"
        urgent:
          label: "Urgent"
        important:
          label: "Important"
      callbacks:
        on_left: "toggle_menu"
        on_middle: "do_nothing"
        on_right: "do_nothing" #"toggle_label"
  wallpapers:
    type: "yasb.wallpapers.WallpapersWidget"
    options:
      label: "<span>\udb83\ude09</span>"
      # Example path to folder with images. Can be a single string or a list of strings.
      image_path: "C:\\Users\\{Username}\\Pictures\\Ultimate Back ground"
      gallery:
          enabled: true
          blur: true
          image_width: 220
          image_per_page: 6
          orientation: "portrait"
          show_buttons: false
          image_spacing: 8
          lazy_load: true
          lazy_load_fadein: 400
          image_corner_radius: 12
  bluetooth:
    type: "yasb.bluetooth.BluetoothWidget"
    options:
      label: "<span>{icon}</span> {device_count}"
      label_alt: "{device_name}"
      label_no_device: "No devices connected"
      label_device_separator: ", "
      max_length: 10
      max_length_ellipsis: "..."
      icons: 
        bluetooth_on: "\udb80\udcaf"
        bluetooth_off: "\udb80\udcb2"
        bluetooth_connected: "\udb80\udcb1"
      device_aliases:
        - name: "T5.0"
          alias: "\uf025"
      callbacks:
        on_left: "toggle_label"
        on_right: "exec cmd.exe /c start ms-settings:bluetooth"
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
  media:
    type: "yasb.media.MediaWidget"
    options:
      label: "🎵{title}"
      label_alt: "{artist}"
      max_field_size:
        label: 18
        label_alt: 18
      show_thumbnail: false
      controls_hide: true
      hide_empty: true
      callbacks:
        on_left: "toggle_media_menu"
        on_middle: "do_nothing"
        on_right: "toggle_label"
      icons:
        prev_track: "\ue892"
        next_track: "\ue893"
        play: "\ue768"
        pause: "\ue769"
      media_menu:
        blur: true
        round_corners: true
        round_corners_type: "small"
        alignment: "center"
        direction: "down"
        offset_top: 0
        thumbnail_corner_radius: 12
        thumbnail_size: 80
        max_title_size: 80
        max_artist_size: 40
        show_source: true
      media_menu_icons:
        play: "\ue768"
        pause: "\ue769"
        prev_track: "\ue892"
        next_track: "\ue893"
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
  cpu:
    type: "yasb.cpu.CpuWidget"
    options:
      label: "<span>\uf4bc</span> {info[percent][total]}%"
      label_alt: "<span>\uf437</span> {info[histograms][cpu_percent]}"
      update_interval: 2000
      histogram_icons:
        - '\u2581' # 0%
        - '\u2581' # 10%
        - '\u2582' # 20%
        - '\u2583' # 30%
        - '\u2584' # 40%
        - '\u2585' # 50%
        - '\u2586' # 60%
        - '\u2587' # 70%
        - '\u2588' # 80%+
      histogram_num_columns: 8
      callbacks:
        on_right: "exec cmd /c Taskmgr"
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]     
  libre_gpu:
    type: "yasb.libre_monitor.LibreHardwareMonitorWidget"
    options:
      label: "<span>\uf2db</span> {info[value]}{info[unit]}"
      sensor_id: "/intelcpu/0/temperature/1"
      label_alt: ""
      update_interval: 2
      precision: 0
      class_name: "libre-monitor-widget"
      callbacks:
        on_left: "toggle_menu"
        on_middle: "do_nothing"
        on_right: "exec cmd /c Taskmgr"
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
      libre_menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 0
        offset_left: 0
        header_label: "System Monitor"
        precision: 1
        columns: 1
        sensors:
          - id: "/intelcpu/0/temperature/1"
            name: "CPU Temp"
          - id: "/intelcpu/0/load/0"
            name: "CPU Load"
          - id: "/intelcpu/0/power/0"
            name: "CPU Power"
          - id: "/gpu-amd/0/temperature/7"
            name: "GPU Temp"
          - id: "/gpu-amd/0/load/0"
            name: "GPU Load"
          - id: "/gpu-amd/0/power/3"
            name: "GPU Power"
          - id: "/nic/%7B2F75B022-BCA1-41F3-B83C-0C47EE038B56%7D/throughput/7"
            name: "Ethernet Upload"
          - id: "/nic/%7B2F75B022-BCA1-41F3-B83C-0C47EE038B56%7D/throughput/8"
            name: "Ethernet Download"
  pomodoro:
    type: "yasb.pomodoro.PomodoroWidget"
    options:
      label: "<span>{icon}</span> {remaining}"
      label_alt: "<span>{icon}</span> {session}/{total_sessions} - {status}"
      work_duration: 25
      break_duration: 5
      long_break_duration: 15
      long_break_interval: 4
      auto_start_breaks: true
      auto_start_work: true
      sound_notification: true
      show_notification: true
      hide_on_break: false
      session_target: 8
      icons:
        work: "\uf252"
        break: "\uf253"
        paused: "\uf254"
      container_padding:
        top: 0
        left: 12
        bottom: 0
        right: 12
      menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        circle_background_color: "#09ffffff"
        circle_work_progress_color: "#88c0d0"
        circle_break_progress_color: "#a3be8c"
        circle_thickness: 8
        circle_size: 160
      callbacks:
        on_left: "toggle_menu"
        on_middle: "reset_timer"
        on_right: "toggle_label"
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
  github:
    type: "yasb.github.GithubWidget"
    options:
      label: "<span>\ueba1</span>"
      label_alt: "Notifications {data}" # {data} return number of unread notification
      token: env # GitHub Personal access tokens (classic) https://github.com/settings/tokens
      max_notification: 20 # Max number of notification displaying in menu max: 50
      notification_dot:
        enabled: True
        corner: "bottom_left" # Can be "top_left", "top_right", "bottom_left", "bottom_right"
        color: "red" # Can be hex color or string
        margin: [ 1, 1 ] # x and y margin for the dot
      only_unread: true # Show only unread or all notifications; 
      max_field_size: 54 # Max characters in title before truncation.
      update_interval: 300 # Check for new notification in seconds
      menu:
        blur: True # Enable blur effect for the menu
        round_corners: True # Enable round corners for the menu (this option is not supported on Windows 10)
        round_corners_type: "normal" # Set the type of round corners for the menu (normal, small) (this option is not supported on Windows 10)
        border_color: "System" # Set the border color for the menu (this option is not supported on Windows 10)
        alignment: "right"
        direction: "down"
      label_shadow:
        enabled: True
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
  lang:
    type: "yasb.language.LanguageWidget"
    options:
      label: "{lang[language_code]}-{lang[country_code]}"
      label_alt: "{lang[full_name]}"
      update_interval: 1
      callbacks:
        on_left: "toggle_menu"
        on_middle: "do_nothing"
        on_right: "do_nothing" #"toggle_label"
      language_menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "system"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        show_layout_icon: true
        layout_icon: "\uf11c"
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
  systray:
    type: "yasb.systray.SystrayWidget"
    options:
      class_name: "systray"
      show_unpinned: true
      show_unpinned_button: true
      show_battery: false
      show_volume: false
      show_network: false
      icon_size: 14
      label_collapsed: "\uf053"
      label_expanded: "\uf054"
      label_position: "right"
