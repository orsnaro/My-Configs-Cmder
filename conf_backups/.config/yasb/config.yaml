watch_stylesheet: true
watch_config: true
debug: true
komorebi:
  start_command: "komorebic start --whkd"
  stop_command: "komorebic stop --whkd"
  reload_command: "komorebic stop --whkd && komorebic start --whkd"
bars:
  primary-bar:
    enabled: true
    screens: ['*']  # show on all UNASSIGNED SCREENS
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: true
    blur_effect:
      enabled: true
      acrylic: false
      dark_mode: true
      round_corners: true
      border_color: None
    window_flags:
      hide_on_fullscreen: true
      always_on_top: false
      windows_app_bar: true
      auto_hide: false
    dimensions:
      width: 1360
      height: 28
    padding:
      top: 2
      left: 0
      bottom: 0
      right: 0
    widgets:
      left: [ 
          "home", 
          "glazewm_workspaces",
          "taskbar",
          # "launchpad",
          "quick_launch", 

          #"active_window",
          "media",
          
      ]
      center: [
          "clock",
          "weather",
        ]
      right: [
          "grouper-extras",
          "network",
          #"traffic",
          "lang",
          "bluetooth",
          "microphone",
          #"volume",
          "voicemeeter",
