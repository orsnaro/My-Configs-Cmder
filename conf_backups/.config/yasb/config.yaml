      ]
  bar-3:
    enabled: true
    screens: ['\\.\DISPLAY10']
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: true
    blur_effect:
      enabled: true
      acrylic: false
      dark_mode: true
      round_corners: true
      border_color: None
    window_flags:
      hide_on_fullscreen: false
      always_on_top: true
      windows_app_bar: true
      auto_hide: false
    dimensions:
      width: 1428
      height: 28
    padding:
      top: 2
      left: 0
      bottom: 0
      right: 0
    widgets:
      left: [ 
          "home", 
